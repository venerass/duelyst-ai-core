name: Publish to PyPI

on:
  push:
    tags: ["v*"]

jobs:
  test:
    name: Quality Gate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --dev
      - name: Ruff check
        run: uv run ruff check src/ tests/
      - name: Ruff format check
        run: uv run ruff format --check src/ tests/
      - name: mypy
        run: uv run mypy src/
      - name: Run tests
        run: uv run pytest --cov --cov-report=term-missing -v

  publish:
    name: Build & Publish
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # trusted publishing
      contents: write  # GitHub release
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Verify tag matches pyproject.toml version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(python -c "
          import tomllib, pathlib
          data = tomllib.loads(pathlib.Path('pyproject.toml').read_text())
          print(data['project']['version'])
          ")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match pyproject.toml version $PKG_VERSION"
            exit 1
          fi
      - name: Build package
        run: uv build
      - name: Verify wheel installs and imports
        run: |
          python -m venv /tmp/verify-venv
          /tmp/verify-venv/bin/pip install dist/*.whl
          /tmp/verify-venv/bin/python -c "import duelyst_ai_core; print(duelyst_ai_core.__version__)"
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
